services:
  edge-nginx:
    image: nginx:1.30.0-alpine@sha256:0272e4604ed93c1792f03695a033a6e8546840f86e0de20a884bb17d2c924883
    container_name: edge-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: nginx:1.30.0-alpine@sha256:0272e4604ed93c1792f03695a033a6e8546840f86e0de20a884bb17d2c924883
    container_name: recommendations-v1
    volumes:
      - ./docker/recommendations-v1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro

  recommendations-v2:
    image: nginx:1.30.0-alpine@sha256:0272e4604ed93c1792f03695a033a6e8546840f86e0de20a884bb17d2c924883
    container_name: recommendations-v2
    volumes:
      - ./docker/recommendations-v2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: nginx-traffic-generator
    command:
      - --base-url
      - http://edge-nginx:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-nginx

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.8.0@sha256:9b5b40104338d178fe35916ca03c86a62af22bec535cd27841846bcac885bd44}
    container_name: obi-nginx-example
    command:
      - --config=/config/obi-config.yaml
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-nginx
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.25.0@sha256:cc97e494d697f0b45997f91ad3b350fd85a5fe51afc41783ba5fcaebe19560cf
    container_name: lgtm-nginx-example
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
