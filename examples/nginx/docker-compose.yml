services:
  edge-nginx:
    image: nginx:1.30.0-alpine@sha256:f60d139a69209d4340f6621fc6a50c9843702214231522a3390432f8db0ed870
    container_name: edge-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: nginx:1.30.0-alpine@sha256:f60d139a69209d4340f6621fc6a50c9843702214231522a3390432f8db0ed870
    container_name: recommendations-v1
    volumes:
      - ./docker/recommendations-v1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro

  recommendations-v2:
    image: nginx:1.30.0-alpine@sha256:f60d139a69209d4340f6621fc6a50c9843702214231522a3390432f8db0ed870
    container_name: recommendations-v2
    volumes:
      - ./docker/recommendations-v2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: nginx-traffic-generator
    command:
      - --base-url
      - http://edge-nginx:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-nginx

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.7.1@sha256:2a4df79f8af2d33090963b928bff4b38b691cb692fd75f02842d68b1359a4757}
    container_name: obi-nginx-example
    command:
      - --config=/config/obi-config.yaml
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-nginx
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.24.1@sha256:fb550fc859490b1ee84d782b687ced21634f97c339b120659230683426afeb74
    container_name: lgtm-nginx-example
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
