services:
  edge-nginx:
    image: nginx:1.29.8-alpine@sha256:2c4de29ca0588f9b56ced6691e0c605c2fd00501478e2e12949ba062304bc1ca
    container_name: edge-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: nginx:1.29.8-alpine@sha256:2c4de29ca0588f9b56ced6691e0c605c2fd00501478e2e12949ba062304bc1ca
    container_name: recommendations-v1
    volumes:
      - ./docker/recommendations-v1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro

  recommendations-v2:
    image: nginx:1.29.8-alpine@sha256:2c4de29ca0588f9b56ced6691e0c605c2fd00501478e2e12949ba062304bc1ca
    container_name: recommendations-v2
    volumes:
      - ./docker/recommendations-v2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: nginx-traffic-generator
    command:
      - --base-url
      - http://edge-nginx:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-nginx

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.7.0@sha256:0509222f3f270136847f714471a027205097517897f293861871930d095d1ade}
    container_name: obi-nginx-example
    command:
      - --config=/config/obi-config.yaml
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-nginx
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.23.0@sha256:dde2dcd51e955e27e1ab454e6ba8e6f8c958e7d22dca1d4ab0be87fa64198051
    container_name: lgtm-nginx-example
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
