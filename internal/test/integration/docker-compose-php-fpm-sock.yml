services:
  nginx:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/php/unix_sock_sql/docker/Dockerfile_nginx
      args:
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.29.1@sha256:0236ee02dcbce00b9bd83e0f5fbc51069e7e1161bd59d99885b3ae1734f3392e}
    container_name: hatest-nginx
    ports:
      - 8080:80
    volumes:
      - ../../../internal/test/integration/components/php/unix_sock_sql/src/:/var/www/html
      - ../../../internal/test/integration/components/php/unix_sock_sql/config/nginx/sites-available:/etc/nginx/sites-available
      - php-socket:/var/run/php-fpm
    networks:
      - test-network
    depends_on:
      - php

  php:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/php/unix_sock_sql/docker/Dockerfile_php
    container_name: hatest-php
    ports:
      - 9000:9000
    volumes:
      - ../../../internal/test/integration/components/php/unix_sock_sql/src/:/var/www/html
      - /var/www/html/vendor/
      - php-socket:/run/php-fpm
    networks:
      - test-network
    depends_on:
      - mysql

  mysql:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/php/unix_sock_sql/docker/Dockerfile_mysql
    container_name: hatest-mysql
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: "test"
    networks:
      - test-network

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-php.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-php:/var/run/obi
    image: hatest-javaobi
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    network_mode: "host"
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_EXECUTABLE_PATH: "(nginx|php-fpm)"
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
    depends_on:
      nginx:
        condition: service_started
      otelcol:
        condition: service_started

  # OpenTelemetry Collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.150.1@sha256:a516c26968aa1feb5e5fc0562e3338ea13755cb4f373603226bcc4e276374ad0
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-4017.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4017" # OTLP over gRPC receiver
      - "4018:4018" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started

  # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.0@sha256:131bf4c9d8a0337782ea8b753249f4903afac01379f3cced87ceaf8ca82ab9f3
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --log.level=debug
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686" # Query frontend
      - "4317:4317" # OTEL GRPC traces collector
      - "4318:4318" # OTEL HTTP traces collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug

volumes:
  mysql-data:
  php-socket:

networks:
  test-network:
