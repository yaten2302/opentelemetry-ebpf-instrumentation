version: "3.8"

services:
  testserver:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/testserver/Dockerfile
    image: hatest-testserver
    ports:
      - "8080:8080" # std http server
      - "8088:8088" # jsonrpc server
    environment:
      LOG_LEVEL: DEBUG
    depends_on:
      otelcol:
        condition: service_started
      jaeger:
        condition: service_started

  # another instance of the above image. Used to test the deduplication
  # of metrics when they come from the same executable file
  testserver-unused:
    image: hatest-testserver
    ports:
      - "38080:8080"
    environment:
      LOG_LEVEL: DEBUG

  testserver1:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/testserver/Dockerfile_rename1
    image: hatest-testserver1
    ports:
      - "8900:8900"
    environment:
      LOG_LEVEL: DEBUG

  # image that runs two instances of the 'testserver' executable
  # Used to test the deduplication
  # of metrics when they come from the same executable file
  testserver-duplicate:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/testserver/Dockerfile_duplicate
    image: hatest-testserver-duplicate
    ports:
      - "18080:18080"
      - "18090:18090"
    environment:
      LOG_LEVEL: DEBUG

  rtestserver:
    image: ghcr.io/open-telemetry/obi-testimg:rust-0.1.0@sha256:3989aa18c1e23cbb5a4c511ae1ad3456f94a9b967fd916bc21ee10c1d940a95d
    ports:
      - 8091:8090

  rtestserverssl:
    image: ghcr.io/open-telemetry/obi-testimg:rust-ssl-0.1.0@sha256:9f7d6352112dd6f3999f85cdb847c1e8b462a48dedbf2ba55337f3efcbd6fd1a
    ports:
      - 8491:8490
    environment:
      LOG_LEVEL: DEBUG

  pytestserverssl:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/pythonserver/Dockerfile_tls
    image: hatest-testserver-python-ssl
    ports:
      - 8381:8380

  pytestserver:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/pythonserver/Dockerfile_7773
    image: hatest-testserver-python
    ports:
      - 7773:7773

  ntestserverssl:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/nodejsserver/Dockerfile
    image: hatest-testserver-node-ssl
    command:
      - node
      - app_tls.js
    ports:
      - 3034:3033

  ntestserver:
    build:
      context: ../../..
      dockerfile: internal/test/integration/components/nodejsserver/Dockerfile
    image: hatest-testserver-node
    command:
      - node
      - app.js
    ports:
      - 3031:3030

  utestserver:
    image: ghcr.io/open-telemetry/obi-testimg:rails-0.1.0@sha256:7a72159a113b9044378c42f7ea27ab00673c6a0ebfe3ac205cc006f46606b36c
    ports:
      - 3041:3040

  utestserverssl:
    image: ghcr.io/open-telemetry/obi-testimg:rails-ssl-0.1.0@sha256:b230987a8e15e33c42f4d8fc1bdda22539c9614695ac833c1e7e9697efd2aaa7
    ports:
      - 3044:3043

  jtestserver:
    image: ghcr.io/open-telemetry/obi-testimg:java-jar-0.1.0@sha256:92d325a0a7aadcce2559de70ef66d39fa07075b57d8fa33b4244ada4dde3787e
    ports:
      - "8086:8085"

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-multiexec${MULTI_TEST_MODE}.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-multi:/var/run/obi
    image: hatest-obi
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_METRICS_FEATURES: "application,application_span"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
      OTEL_EBPF_INTERNAL_METRICS_PROMETHEUS_PORT: 8999
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "0ms"
      OTEL_EBPF_INTERNAL_METRICS_PROMETHEUS_PATH: /metrics
      OTEL_EBPF_BPF_DISABLE_BLACK_BOX_CP: "${OTEL_EBPF_BPF_DISABLE_BLACK_BOX_CP}"
      OTEL_EBPF_BPF_CONTEXT_PROPAGATION: "${OTEL_EBPF_BPF_CONTEXT_PROPAGATION}"
      OTEL_EBPF_BPF_TRACK_REQUEST_HEADERS: "${OTEL_EBPF_BPF_TRACK_REQUEST_HEADERS}"
    ports:
      - "8999:8999"

  # OpenTelemetry Collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.150.1@sha256:a516c26968aa1feb5e5fc0562e3338ea13755cb4f373603226bcc4e276374ad0
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-4017.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4017" # OTLP over gRPC receiver
      - "4018:4018" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started

  # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.0@sha256:131bf4c9d8a0337782ea8b753249f4903afac01379f3cced87ceaf8ca82ab9f3
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --log.level=debug
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686" # Query frontend
      - "4317:4317" # OTEL GRPC traces collector
      - "4318:4318" # OTEL HTTP traces collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug
# curl http://localhost:16686/api/services
# curl http://localhost:16686/api/traces?service=testserver
