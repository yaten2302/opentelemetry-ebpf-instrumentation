apiVersion: v1
kind: ConfigMap
metadata:
  name: obi-config
data:
  obi-config.yml: |
    attributes:
      kubernetes:
        enable: true
    log_level: debug
    discovery:
      instrument:
        - k8s_deployment_name: testserver
        - k8s_daemonset_name: hostpid-httpserver
    routes:
      patterns:
        - /pingpong
      unmatched: path
    otel_traces_export:
      endpoint: http://jaeger:4318
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: obi
spec:
  selector:
    matchLabels:
      instrumentation: obi
  template:
    metadata:
      labels:
        instrumentation: obi
        teardown: delete
    spec:
      hostPID: true
      serviceAccountName: obi
      volumes:
        - name: obi-config
          configMap:
            name: obi-config
        - name: testoutput
          persistentVolumeClaim:
            claimName: testoutput
      containers:
        - name: obi
          image: obi:dev
          imagePullPolicy: Never
          args: ["--config=/config/obi-config.yml"]
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - mountPath: /config
              name: obi-config
            - mountPath: /testoutput
              name: testoutput
          env:
            - name: GOCOVERDIR
              value: "/testoutput"
            - name: OTEL_EBPF_DISCOVERY_POLL_INTERVAL
              value: "500ms"
            - name: OTEL_EBPF_METRICS_INTERVAL
              value: "10ms"
            - name: OTEL_EBPF_BPF_BATCH_TIMEOUT
              value: "10ms"
            - name: OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT
              value: "0ms"
