services:
  certgen:
    build:
      context: ./components/nginx-rails-sql/certgen
    image: rails-nginx-sql-certgen:latest
    volumes:
      - mysql_server_certs:/out/mysql-server
      - mysql_client_certs:/out/mysql-client
      - nginx_certs:/out/nginx

  testserver:
    image: ghcr.io/open-telemetry/obi-testimg:rails-sql-0.0.1@sha256:6d3777a979af47d99b90d7d3f891332ee6b469964b1abf0af9f8c57df0711583
    command: bash -c "sleep 10 && bundle exec rails db:create db:migrate db:seed && rails server -p 3040 -b 0.0.0.0"
    container_name: rails_app
    ports:
      - "3041:3040"
    environment:
      OTEL_SERVICE_NAME: "my-ruby-app"
      OTEL_RESOURCE_ATTRIBUTES: "data-center=ca,deployment-zone=to"
    depends_on:
      certgen:
        condition: service_completed_successfully
      otelcol:
        condition: service_started
      db:
        condition: service_started
    networks:
      - app_network
    volumes:
      - mysql_client_certs:/certs:ro

  nginx:
    image: nginx:latest@sha256:dec7a90bd0973b076832dc56933fe876bc014929e14b4ec49923951405370112
    container_name: nginx_server
    ports:
      - "8443:443" # Expose TLS port
    volumes:
      - ./components/nginx-rails-sql/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/tls:ro
    depends_on:
      certgen:
        condition: service_completed_successfully
      testserver:
        condition: service_started
    networks:
      - app_network

  db:
    image: mysql:9.7.0@sha256:c9e48b0c008f1936d4139d1c0dcd5950a9dbe57d4d40f383013cde432fa6d6aa
    command:
      - --ssl-ca=/etc/mysql/certs/ca.pem
      - --ssl-cert=/etc/mysql/certs/server-cert.pem
      - --ssl-key=/etc/mysql/certs/server-key.pem
      - --bind-address=0.0.0.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: my_database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - mysql_server_certs:/etc/mysql/certs:ro
    depends_on:
      certgen:
        condition: service_completed_successfully
    networks:
      - app_network

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/obi-config-ruby.yml
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-ruby:/var/run/obi
    image: hatest-obi
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    network_mode: "host"
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_OPEN_PORT: "3040,443"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_EXECUTABLE_PATH: "${OTEL_EBPF_EXECUTABLE_PATH}"
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
    depends_on:
      testserver:
        condition: service_started

  # OpenTelemetry Collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.150.1@sha256:a516c26968aa1feb5e5fc0562e3338ea13755cb4f373603226bcc4e276374ad0
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317:4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started

  # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.0@sha256:131bf4c9d8a0337782ea8b753249f4903afac01379f3cced87ceaf8ca82ab9f3
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  # Jaeger for Traces
  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686" # Query frontend
      - "4417:4317" # OTEL GRPC traces collector
      - "4418:4318" # OTEL HTTP traces collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug

volumes:
  db_data:
  mysql_server_certs:
  mysql_client_certs:
  nginx_certs:

networks:
  app_network:
