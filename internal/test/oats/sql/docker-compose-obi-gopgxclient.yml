version: "3.9"
services:
  sqlserver:
    build:
      context: ../../integration/components/postgresql
      dockerfile: Dockerfile
    image: postgres
    environment:
      POSTGRES_PASSWORD: "postgres" # Supplied so we can load the test schema
    ports:
      - "5432:5432"
  testserver:
    build:
      context: ../../integration/components/gopgx
      dockerfile: Dockerfile
    image: gopgxclient
    ports:
      - "8080:8080"
  # eBPF auto instrumenter
  autoinstrumenter:
    build:
      context: ../../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    command:
      - --config=/configs/instrumenter-config-traces.yml
    volumes:
      - {{ .ConfigDir }}:/configs
      - ./testoutput/run:/var/run/obi
      - ../../../../testoutput:/coverage
    cap_add:
      - SYS_ADMIN
    privileged: true # in some environments (not GH Pull Requests) you can set it to false and then cap_add: [ SYS_ADMIN ]
    network_mode: "service:testserver"
    pid: "service:testserver"
    environment:
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_TRACE_PRINTER: "text"
      OTEL_EBPF_OPEN_PORT: {{ .ApplicationPort }}
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://collector:4318"
    depends_on:
      testserver:
        condition: service_started
