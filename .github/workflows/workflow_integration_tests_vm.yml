name: Pull request integration tests on VM

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
    paths:
      - ".github/workflows/workflow_integration_tests_vm.yml"
      - "bpf/**"
      - "internal/test/integration/**"
      - "internal/test/vm/**"
      - "scripts/generate-integration-matrix.sh"
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vm-test-matrix:
    name: "Build VM integration matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: build matrix
        id: build-matrix
        env:
          # 5 partitions, one for each of:
          #  1. TestMultiProcess
          #  2. TestMultiProcessAppCP
          #  3. TestMultiProcessAppCPHeadersOnly
          #  4. TestMultiProcessAppCPTCPOnly
          #  5. TestMultiProcessAppCPIPOnly

          PARTITIONS: 5
        run: |
          echo -n "matrix=" >> $GITHUB_OUTPUT
          make vm-integration-test-matrix-json >> $GITHUB_OUTPUT

  test:
    name: kernel ${{ matrix.kernel.kernel-version }} ${{ matrix.kernel.arch }} ${{ matrix.test.description }}
    needs: vm-test-matrix
    permissions:
      # Required for codecov
      checks: write
      pull-requests: write
      # Required for uploading artifacts
      actions: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - kernel-version: "5.15.152"
            arch: "x86_64"
          - kernel-version: "6.10.6"
            arch: "x86_64"
        test: ${{ fromJson(needs.vm-test-matrix.outputs.matrix).include }}
    steps:
      - name: Check initial disk usage
        run: df -h

      - name: Free up disk space
        run: |
          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Chromium (optional if not using for browser tests)
          sudo rm -rf /usr/local/share/chromium

          # Remove Microsoft/Edge and Google Chrome builds
          sudo rm -rf /opt/microsoft /opt/google

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell

          # Remove CodeQL (but keep hostedtoolcache for Go)
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Generate files
        run: make prereqs docker-generate

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86

      - name: Pre-compile Go integration tests and gotestsum
        run: |
          mkdir compiled-tests
          CGO_ENABLED=0 go test -c -ldflags="-s -w" -o compiled-tests/ ./internal/test/integration
          CGO_ENABLED=0 go build -C internal/tools -o ../../compiled-tests/gotestsum -ldflags="-s -w" gotest.tools/gotestsum

      - name: Pre-build Docker images for VM tests
        run: |
          # Auto-discover Docker images from compose files and build them on
          # the host at native speed, avoiding slow in-VM builds under QEMU
          # TCG (software CPU emulation). Scans for services that have both a
          # 'build: dockerfile:' and 'image: hatest-*', skipping entries with
          # env var substitutions in the dockerfile path.
          mapfile -t ENTRIES < <(
            awk '
              /^  [a-zA-Z]/ {
                if (df && img && !(img in seen)) { seen[img]=1; print img "=" df }
                df=""; img=""
              }
              /dockerfile:/ {
                sub(/.*dockerfile: */, ""); gsub(/["'"'"']/, ""); sub(/^\.\/*/, "")
                if ($0 !~ /\$\{/) df=$0
              }
              /image: *hatest-/ { sub(/.*image: */, ""); img=$0 }
              END { if (df && img && !(img in seen)) print img "=" df }
            ' internal/test/integration/docker-compose-multiexec*.yml | sort
          )

          echo "Discovered ${#ENTRIES[@]} Docker images to pre-build"
          IMAGE_TAGS=()
          for entry in "${ENTRIES[@]}"; do
            tag="${entry%%=*}"
            dockerfile="${entry#*=}"
            echo "Building ${tag} from ${dockerfile}..."
            docker build --quiet -t "${tag}" -f "${dockerfile}" .
            IMAGE_TAGS+=("${tag}")
          done

          if [ ${#IMAGE_TAGS[@]} -gt 0 ]; then
            echo "Saving ${#IMAGE_TAGS[@]} Docker images to tar..."
            docker save "${IMAGE_TAGS[@]}" -o compiled-tests/docker-images.tar
            echo "Docker images saved ($(du -h compiled-tests/docker-images.tar | cut -f1))"
            docker builder prune -af
          fi

      - name: Run VM integration tests (${{ matrix.test.description }})
        timeout-minutes: 60
        env:
          # zizmor template-injection fixes: pass data as env vars
          MATRIX_ID: ${{ matrix.test.id }}
          MATRIX_JSON: ${{ toJson(matrix.test) }}
          MATRIX_TEST_PATTERN: ${{ matrix.test.test_pattern }}
          RUN_NUMBER: ${{ github.run_number }}
          ARCH: ${{ matrix.kernel.arch }}
          KERNEL_VERSION: ${{ matrix.kernel.kernel-version }}
        run: |
          echo "VM Partition for kernel $KERNEL_VERSION"
          echo "${MATRIX_JSON}"

          if [ -z "${MATRIX_TEST_PATTERN}" ]; then
            echo "Error: Test pattern is empty for shard $MATRIX_ID"
            exit 1
          fi

          # Run VM tests with pre-compiled tests
          sudo make -C internal/test/vm \
            KERNEL_VER=${KERNEL_VERSION} \
            ARCH=${ARCH} \
            TEST_PATTERN="${MATRIX_TEST_PATTERN}" \
            RUN_NUMBER="${RUN_NUMBER}" \
            PRECOMPILED_TESTS_DIR="$(pwd)/compiled-tests" \
            && [ -f testoutput/success ]

      - name: Process coverage data
        run: make itest-coverage-data

      - name: Report coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./testoutput/itest-covdata.txt
          flags: integration-test-vm-${{ matrix.kernel.arch }}-${{ matrix.kernel.kernel-version }}
          name: vm-integration-test-coverage-${{ matrix.kernel.kernel-version }}-${{ matrix.kernel.arch }}-${{ matrix.test.id }}-${{ github.run_number }}

      - name: Upload integration test logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: vm-integration-test-logs-${{ matrix.kernel.kernel-version }}-${{ matrix.kernel.arch }}-${{ matrix.test.id }}-${{ github.run_number }}
          path: |
            testoutput/*.log
            testoutput/kind
