name: Release

on:
  push:
    tags:
      # N.B. These workflows also trigger on this tag pattern:
      # - publish_dockerhub_main.yml
      # - publish_dockerhub_k8s_cache_main.yml
      # Glob patterns to match semver tags starting with 'v'
      # Used as a filter. Full validation is done in a job below.
      - "v[0-9]+.[0-9]+.[0-9]*"           # v1.2.3, v1.2.3-rc.1, v1.2.3-alpha, v1.2.3-rc.1+build.123, v1.2.3+build.123
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.3)"
        required: true
        type: string
      latest:
        description: "Tag image as 'latest'"
        required: false
        type: boolean
        default: false

# https://docs.zizmor.sh/audits/#excessive-permissions
permissions: {}

jobs:
  # Validate tag format before proceeding with release.
  validate-tag:
    name: Validate Tag Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate tag format
        env:
          WORKFLOW_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKFLOW_EVENT: ${{ github.event_name }}
        run: |
          # Get the tag based on trigger type
          if [ "$WORKFLOW_EVENT" = "workflow_dispatch" ]; then
            TAG="$WORKFLOW_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi

          # Validate tag format (must be v followed by valid semver)
          # Strip 'v' prefix for validation
          if [[ "$TAG" =~ ^v(.*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "ERROR: Tag must start with 'v' (e.g., v1.2.3), got: $TAG"
            exit 1
          fi

          # Validate semver format
          # Regex for a semver digit
          D='0|[1-9][0-9]*'
          # Regex for a semver pre-release word
          PW='[0-9]*[a-zA-Z-][0-9a-zA-Z-]*'
          # Regex for a semver build-metadata word
          MW='[0-9a-zA-Z-]+'

          if [[ "$VERSION" =~ ^($D)\.($D)\.($D)(-(($D|$PW)(\.($D|$PW))*))?(\+($MW(\.$MW)*))?$ ]]; then
            echo "Tag format validated: $TAG"
          else
            echo "ERROR: Tag must be valid semver with 'v' prefix (e.g., v1.2.3, v1.2.3-rc1, v1.2.3+build), got: $TAG"
            exit 1
          fi

      - name: Verify tag exists
        env:
          WORKFLOW_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKFLOW_EVENT: ${{ github.event_name }}
        run: |
          # Get the tag based on trigger type
          if [ "$WORKFLOW_EVENT" = "workflow_dispatch" ]; then
            TAG="$WORKFLOW_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi

          # Check if tag exists in repository
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: Tag '$TAG' does not exist in the repository"
            exit 1
          fi
          echo "Tag '$TAG' verified to exist in repository"

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/pull_request.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/pull_request_integration_tests.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  k8s-integration-tests:
    name: K8s Integration Tests
    uses: ./.github/workflows/pull_request_k8s_integration_tests.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  oats-tests:
    name: OATS Tests
    uses: ./.github/workflows/pull_request_oats_test.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  vm-integration-tests:
    name: VM Integration Tests
    uses: ./.github/workflows/workflow_integration_tests_vm.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  java-agent-tests:
    name: Java Agent Tests
    uses: ./.github/workflows/java-agent.yml
    needs: validate-tag
    permissions:
      contents: read
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  format-check:
    name: Format Check
    uses: ./.github/workflows/clang-format-check.yml
    needs: validate-tag
    permissions:
      contents: read
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  tidy-check:
    name: Tidy Check
    uses: ./.github/workflows/clang-tidy-check.yml
    needs: validate-tag
    permissions:
      contents: read
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  arm-integration-tests:
    name: ARM Integration Tests
    uses: ./.github/workflows/pull_request_integration_tests_arm.yml
    needs: validate-tag
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  docker-build-test:
    name: Docker Build Test
    uses: ./.github/workflows/pull_request_docker_build_test.yml
    needs: validate-tag
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  determine-latest:
    name: Determine if Latest Release
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if this is the latest release
        id: check
        env:
          WORKFLOW_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WORKFLOW_EVENT: ${{ github.event_name }}
          INPUT_LATEST: ${{ inputs.latest }}
        run: |
          if [ "$WORKFLOW_EVENT" = "workflow_dispatch" ]; then
            echo "is_latest=$INPUT_LATEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="$GITHUB_REF_NAME"
          # Only a clean vX.Y.Z tag (no pre-release suffix or build metadata) can be latest
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Find the highest stable semver tag (excludes pre-releases and build metadata)
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ "$TAG" = "$LATEST" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

  tests-passed:
    name: All Tests Passed
    needs:
      - unit-tests
      - integration-tests
      - k8s-integration-tests
      - oats-tests
      - vm-integration-tests
      - java-agent-tests
      - format-check
      - tidy-check
      - arm-integration-tests
      - docker-build-test
    runs-on: ubuntu-latest
    permissions: {}
    if: success()
    steps:
      - name: All required tests passed
        run: echo "All required tests have passed successfully"

  docker-publish-main:
    name: Publish Docker Image (main)
    uses: ./.github/workflows/publish_dockerhub_main.yml
    needs: [tests-passed, determine-latest]
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      ref: ${{ inputs.tag || github.ref_name }}
      latest: ${{ needs.determine-latest.outputs.is_latest == 'true' }}
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

  docker-publish-k8s-cache:
    name: Publish Docker Image (k8s cache)
    uses: ./.github/workflows/publish_dockerhub_k8s_cache_main.yml
    needs: [tests-passed, determine-latest]
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      ref: ${{ inputs.tag || github.ref_name }}
      latest: ${{ needs.determine-latest.outputs.is_latest == 'true' }}
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

  build-artifacts:
    name: Build Release Artifacts
    needs: tests-passed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Build amd64 release artifacts
        env:
          GOARCH: amd64
        run: make release

      - name: Build arm64 release artifacts
        env:
          GOARCH: arm64
        run: make release

      - name: Build source-generated release artifacts
        run: make release-source

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 1

  release:
    name: Draft Release
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write # https://github.com/softprops/action-gh-release#permissions
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-artifacts
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "open-telemetry/opentelemetry-ebpf-instrumentation" \
            --generate-notes \
            --draft \
            dist/obi-*-linux-*.tar.gz \
            dist/obi-*-source-generated.tar.gz \
            dist/SHA256SUMS
