name: Publish OBI Docker Generator Image
on:
  workflow_dispatch:
    inputs:
      override_image_tag:
        type: string
        description: "Override image tag (empty: SemVer patch + 1)"

# Set restrictive permissions at workflow level
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: open-telemetry/obi-generator

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: 'false'
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      - name: Check Cosign version
        run: cosign version
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE }}"

      - name: Set image tag
        id: image_tag
        env:
          OVERRIDE_IMG_TAG: ${{ github.event.inputs.override_image_tag }}
        run: |
          if [[ "$OVERRIDE_IMG_TAG" == "" ]]; then
            echo "Fetching latest version from ${{ env.REGISTRY }}/${{ env.IMAGE }}..."
          
            # Get authentication token for GHCR
            TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          
            # Fetch tags from GHCR API
            TAGS=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://${{ env.REGISTRY }}/v2/${{ env.IMAGE }}/tags/list")
            echo "Image tags: ${TAGS}"
          
            LATEST_VERSION=$(echo "${TAGS}" | \
              jq -r '.tags[]' | \
              grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | \
              sort -V | \
              tail -n 1)
          
            if [[ -z "$LATEST_VERSION" ]]; then
              echo "No semantic version found, starting with 0.1.0"
              NEW_VERSION="0.1.0"
            else
              echo "Latest version found: $LATEST_VERSION"
              # Parse version components
              IFS='.' read -r major minor patch <<< "$LATEST_VERSION"
              # Increment minor version
              NEW_PATCH=$((patch + 1))
              NEW_VERSION="${major}.${minor}.${NEW_PATCH}"
            fi
          
            echo "New version: $NEW_VERSION"
            echo "imgtag=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "imgtag=$OVERRIDE_IMG_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./generator.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.image_tag.outputs.imgtag }}"
            "${{ env.REGISTRY }}/${{ env.IMAGE }}:latest"

      - name: Sign container images with Cosign
        env: # interpolation via env is safer: https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
          IMGTAG: ${{ steps.image_tag.outputs.imgtag }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          images="${{ env.REGISTRY }}/${{ env.IMAGE }}:${IMGTAG}@${DIGEST}"
          images+=" ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest@${DIGEST}"
          cosign sign --yes ${images}
          for i in 1 2 3 4 5; do
            cosign verify ${images} \
              --certificate-identity-regexp='.*' \
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' && break
            echo "Verify attempt $i failed, retrying in 10s..."
            sleep 10
          done
