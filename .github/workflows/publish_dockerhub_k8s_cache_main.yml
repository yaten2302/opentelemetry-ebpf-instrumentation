# TODO: trigger only if testing or any other checks previously succeeded
name: Push k8s cache to DockerHub (main)
on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string
      latest:
        description: "Tag image as 'latest'"
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_TOKEN_EBPF_INSTRUMENTATION:
        description: "Docker Hub access token for otel"
        required: true

permissions:
  contents: read

env:
  IMAGE_NAME: opentelemetry-ebpf-k8s-cache

jobs:
  build:
    if: github.repository == 'open-telemetry/opentelemetry-ebpf-instrumentation'
    permissions:
      packages: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            otel/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.ref }}
            type=raw,value=latest,enable=${{ inputs.latest == true }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./k8scache.Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }},docker.io/otel/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: k8s-cache-digests-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest-and-sign:
    if: github.repository == 'open-telemetry/opentelemetry-ebpf-instrumentation'
    needs: build
    permissions:
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: k8s-cache-digests-*

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN_EBPF_INSTRUMENTATION }}

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Check Cosign version
        run: cosign version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            otel/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.ref }}
            type=raw,value=latest,enable=${{ inputs.latest == true }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Create manifest list and push
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          META_JSON: ${{ steps.meta.outputs.json }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          shopt -s nullglob
          for arch in amd64 arm64; do
            files=("${DIGESTS_DIR}"/k8s-cache-digests-${arch}/*)
            if [ "${#files[@]}" -ne 1 ] || [ ! -f "${files[0]}" ]; then
              echo "Error: Expected exactly one digest file in k8s-cache-digests-${arch}, found ${#files[@]}"
              exit 1
            fi
          done
          AMD64_DIGEST=$(basename "${DIGESTS_DIR}"/k8s-cache-digests-amd64/*)
          ARM64_DIGEST=$(basename "${DIGESTS_DIR}"/k8s-cache-digests-arm64/*)
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${META_JSON}") \
            "${GHCR_IMAGE}@sha256:${AMD64_DIGEST}" \
            "${GHCR_IMAGE}@sha256:${ARM64_DIGEST}"

      - name: Sign the images using Cosign with GitHub OIDC Token
        env: # interpolation via env is safer: https://docs.github.com/en/actions/reference/security/secure-use#use-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_TO_INSPECT: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: |
          for i in 1 2 3 4 5; do
            DIGEST=$(docker buildx imagetools inspect "${IMAGE_TO_INSPECT}" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest' | tr -d '\n')
            [ -n "${DIGEST}" ] && [ "${DIGEST}" != "null" ] && break
            echo "Inspect attempt $i failed, retrying in 5s..."
            sleep 5
          done
          if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then echo "Failed to inspect image after 5 attempts"; exit 1; fi
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
